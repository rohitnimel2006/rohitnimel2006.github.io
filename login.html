<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial;

            background: linear-gradient(-45deg, #000, #1a1a1a, #ff4757, #000);
            background-size: 400% 400%;
            animation: bgMove 8s infinite;
        }

        @keyframes bgMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        /* INPUT */
        .input-box {
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        /* 👁 ICON */
        .input-box span {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #fff;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 10px;
            border: none;
            background: #ff4757;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff6b81;
            transform: scale(1.1);
        }
    </style>

</head>

<body>

    <div class="login-box">
        <h2>Login</h2>

        <input type="text" id="user" placeholder="Username">

        <div class="input-box">
            <input type="password" id="pass" placeholder="Password">
            <span onclick="togglePassword()">👁</span>
        </div>

        <button onclick="login()">Login</button>
    </div>

    <script>
        function togglePassword() {
            let pass = document.getElementById("pass");

            if (pass.type === "password") {
                pass.type = "text";
            } else {
                pass.type = "password";
            }
        }

        function login() {
            let user = document.getElementById("user").value;
            let pass = document.getElementById("pass").value;

            if (user === "admin" && pass === "1234") {
                alert("Login Successful 🔥");
                window.location.href = "index1.html";
            } else {
                alert("Wrong Details ❌");
            }
        }
    </script>

</body>

</html>
