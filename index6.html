<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model Submission</title>
    <link rel="icon" type="logo 2.jpeg" href="logo 2.jpeg">
    <style>
        body {
            margin: 0;
            font-family: Arial;

            background:
                linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)),
                url('https://images.unsplash.com/photo-1509631179647-0177331693ae') no-repeat center;

            background-size: cover;
            color: #fff;
        }

        /* NAV */
        nav {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: #000;
        }

        nav a {
            color: #fff;
            margin-left: 15px;
            text-decoration: none;
        }

        /* HEADING */
        h1 {
            text-align: center;
            margin: 30px;
            animation: fadeDown 1s ease;
        }

        /* FORM BOX */
        .form-container {
            max-width: 900px;
            margin: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
            animation: zoomIn 1s ease;
        }

        /* GRID */
        .form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* INPUT */
        .form input,
        .form select,
        .form textarea {
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            border-radius: 5px;
            transition: 0.3s;
        }

        .form input:focus {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2);
        }

        /* FULL */
        .full {
            grid-column: span 2;
        }

        /* PHOTO BOXES */
        .photo-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .photo-box {
            border: 2px dashed #aaa;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .photo-box:hover {
            border-color: #ff4757;
            transform: scale(1.05);
        }

        /* BUTTON */
        button {
            grid-column: span 2;
            padding: 12px;
            border: none;
            background: #ff4757;
            color: #fff;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #ff6b81;
            transform: scale(1.1);
        }

        /* ANIMATION */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
            }
        }

        /* MOBILE */
        @media(max-width:768px) {
            .form {
                grid-template-columns: 1fr;
            }

            .photo-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>

</head>

<body>

</body>
