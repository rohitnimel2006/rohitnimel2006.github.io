<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apply - RunwayDreams</title>

<style>

/* BODY */
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #000, #1a1a1a);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    width: 400px;
    background: rgba(255,255,255,0.05);
    padding: 25px;
    border-radius: 10px;
    backdrop-filter: blur(10px);
    box-shadow: 0 0 20px rgba(0,170,255,0.3);
    animation: fadeIn 0.8s ease;
}

/* HEADING */
h2 {
    text-align: center;
    color: white;
    margin-bottom: 20px;
}

/* INPUT GROUP */
.input-box {
    position: relative;
    margin-bottom: 20px;
}

/* INPUT */
.input-box input,
.input-box textarea {
    width: 100%;
    padding: 10px;
    background: transparent;
    border: 1px solid #555;
    border-radius: 5px;
    color: white;
    outline: none;
}

/* LABEL FLOAT */
.input-box label {
    position: absolute;
    top: 10px;
    left: 10px;
    color: #aaa;
    transition: 0.3s;
    pointer-events: none;
}

/* FLOAT EFFECT */
.input-box input:focus + label,
.input-box input:valid + label,
.input-box textarea:focus + label,
.input-box textarea:valid + label {
    top: -10px;
    font-size: 12px;
    color: #00aaff;
}

/* FILE INPUT */
.file-box {
    color: white;
    margin-bottom: 15px;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(45deg, #00aaff, #0066ff);
    border: none;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.3s;
}

/* BUTTON HOVER */


/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(40px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}


</style>
</head>

<body>
    

<div class="container">

<h2>Model Application</h2>

<form>

<div class="input-box">
<input type="text" required>
<label>Full Name</label>
</div>

<div class="input-box">
<input type="date" required>
<label>Date of Birth</label>
</div>

<div class="input-box">
<input type="number" required>
<label>Age</label>
</div>

<div class="input-box">
<input type="text" required>
<label>Height</label>
</div>

<div class="input-box">
<input type="email" required>
<label>Email</label>
</div>

<div class="input-box">
<input type="tel" required>
<label>Phone</label>
</div>

<div class="input-box">
<input type="text" required>
<label>Instagram ID</label>
</div>

<div class="input-box">
<textarea required></textarea>
<label>About You</label>
</div>

<div class="file-box">
<label>Upload 4 Photos:</label><br>
<input type="file" multiple>
</div>

<form id="modelForm">
   <button type="submit">Submit</button>
</form>

</form>

</div>
<script src="form.js"></script>

</body>
</html>
